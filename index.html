<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRM — Заявки</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div class="header__brand">
          <span class="header__logo" aria-hidden="true">◆</span>
          <div>
            <h1 class="header__title">CRM Заявки</h1>
            <p class="header__subtitle">Учёт обращений клиентов</p>
          </div>
        </div>
      </header>

      <main class="main">
        <section class="card card--form" aria-labelledby="form-heading">
          <h2 id="form-heading" class="card__title">Новая заявка</h2>
          <form id="request-form" class="form" novalidate>
            <div class="form__grid">
              <label class="field">
                <span class="field__label">Имя</span>
                <input
                  type="text"
                  name="name"
                  id="name"
                  class="field__input"
                  placeholder="Иван Иванов"
                  required
                  autocomplete="name"
                />
              </label>
              <label class="field">
                <span class="field__label">Телефон</span>
                <input
                  type="tel"
                  name="phone"
                  id="phone"
                  class="field__input"
                  placeholder="+7 900 000-00-00"
                  required
                  autocomplete="tel"
                />
              </label>
            </div>
            <label class="field">
              <span class="field__label">Комментарий</span>
              <textarea
                name="comment"
                id="comment"
                class="field__input field__input--area"
                rows="3"
                placeholder="Опишите запрос клиента…"
              ></textarea>
            </label>
            <div id="form-status" class="status" role="status" aria-live="polite"></div>
            <div class="form__actions">
              <button type="submit" class="btn btn--primary" id="save-btn">
                <span class="btn__label">Сохранить</span>
              </button>
            </div>
          </form>
        </section>

        <section class="card card--table" aria-labelledby="table-heading">
          <div class="card__head">
            <h2 id="table-heading" class="card__title">Заявки</h2>
            <label class="search">
              <span class="visually-hidden">Поиск по имени</span>
              <svg class="search__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
                <path d="M20 20L16 16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
              <input
                type="search"
                id="search"
                class="search__input"
                placeholder="Поиск по имени"
                autocomplete="off"
              />
            </label>
          </div>

          <div id="status" class="status" role="status" aria-live="polite"></div>

          <div class="table-wrap">
            <table class="table" id="requests-table">
              <thead>
                <tr>
                  <th>Имя</th>
                  <th>Телефон</th>
                  <th>Комментарий</th>
                  <th>Дата создания</th>
                  <th class="table__actions-col"></th>
                </tr>
              </thead>
              <tbody id="requests-body">
                <tr class="table__empty" id="empty-row">
                  <td colspan="5">Загрузка…</td>
                </tr>
              </tbody>
            </table>
          </div>

          <p class="table__hint" id="filter-hint" hidden></p>
        </section>
      </main>

      <footer class="footer">
        <p>Данные хранятся в Google Sheets</p>
      </footer>
    </div>

    <script src="config.js" charset="UTF-8"></script>
    <script src="script.js" charset="UTF-8"></script>
  </body>
</html>
